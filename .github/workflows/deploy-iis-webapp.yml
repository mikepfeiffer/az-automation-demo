name: Deploy IIS Web Application with Pre-Change Snapshot

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - '.github/workflows/deploy-iis-webapp.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      skip_snapshot:
        description: 'Skip pre-deployment snapshot (not recommended)'
        required: false
        type: boolean
        default: false

env:
  AZURE_WEBAPP_NAME: 'contoso-webapp'
  RESOURCE_GROUP: 'prod-webapps-rg'
  VM_NAME: 'iis-webserver-01'
  DEPLOYMENT_ID: ${{ github.run_number }}-${{ github.sha }}

jobs:
  # Job 1: Create pre-deployment snapshot for rollback protection
  pre-deployment-snapshot:
    name: Create Pre-Deployment Snapshot
    runs-on: windows-latest
    # Skip this job if manually requested
    if: ${{ !inputs.skip_snapshot }}
    outputs:
      job_id: ${{ steps.invoke-snapshot.outputs.job_id }}
      snapshot_created: ${{ steps.check-status.outputs.success }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate Change ID
        id: change-id
        shell: pwsh
        run: |
          $changeId = "gh-deploy-${{ env.DEPLOYMENT_ID }}"
          echo "CHANGE_ID=$changeId" >> $env:GITHUB_ENV
          echo "Generated Change ID: $changeId"

      - name: Invoke Azure Automation Snapshot Runbook
        id: invoke-snapshot
        shell: pwsh
        run: |
          Write-Host "Invoking Pre-Change Snapshot runbook via webhook..."

          $webhookUrl = "${{ secrets.SNAPSHOT_WEBHOOK_URL }}"

          if ([string]::IsNullOrWhiteSpace($webhookUrl)) {
              Write-Error "SNAPSHOT_WEBHOOK_URL secret is not configured!"
              exit 1
          }

          # Prepare webhook payload
          $payload = @{
              ResourceGroupName = "${{ env.RESOURCE_GROUP }}"
              VmName = "${{ env.VM_NAME }}"
              ChangeId = "${{ env.CHANGE_ID }}"
              IncludeDataDisks = $true
              RetentionDays = 14
              DryRun = $false
          } | ConvertTo-Json

          Write-Host "Payload:"
          Write-Host $payload

          # Invoke webhook
          try {
              $response = Invoke-WebRequest `
                  -Uri $webhookUrl `
                  -Method POST `
                  -Body $payload `
                  -ContentType "application/json" `
                  -UseBasicParsing

              Write-Host "Webhook invoked successfully"
              Write-Host "Status Code: $($response.StatusCode)"

              # Extract job ID from response headers if available
              $jobId = $response.Headers['x-ms-request-id']
              if ($jobId) {
                  echo "job_id=$jobId" >> $env:GITHUB_OUTPUT
                  Write-Host "Job ID: $jobId"
              }

              # Parse response body for job URL or ID
              if ($response.Content) {
                  Write-Host "Response: $($response.Content)"
                  $content = $response.Content | ConvertFrom-Json
                  if ($content.JobIds) {
                      $actualJobId = $content.JobIds[0]
                      echo "job_id=$actualJobId" >> $env:GITHUB_OUTPUT
                      Write-Host "Extracted Job ID: $actualJobId"
                  }
              }
          }
          catch {
              Write-Error "Failed to invoke webhook: $_"
              Write-Error $_.Exception.Message
              exit 1
          }

      - name: Wait for Snapshot Completion
        id: check-status
        shell: pwsh
        run: |
          Write-Host "Waiting for snapshot creation to complete..."
          Write-Host "This typically takes 60-120 seconds depending on disk size."

          # We'll poll the job status using Azure PowerShell
          # For demo purposes, we're using a simple time-based wait
          # In production, you'd poll the actual job status via Azure API

          $maxWaitSeconds = 180
          $checkIntervalSeconds = 15
          $elapsed = 0

          Write-Host "Starting wait cycle (max $maxWaitSeconds seconds)..."

          while ($elapsed -lt $maxWaitSeconds) {
              Write-Host "[$elapsed/$maxWaitSeconds] Waiting for snapshot operation..."
              Start-Sleep -Seconds $checkIntervalSeconds
              $elapsed += $checkIntervalSeconds

              # In a real scenario, you would check job status here:
              # $jobStatus = Get-AzAutomationJob -JobId $jobId -ResourceGroupName "automation-rg" -AutomationAccountName "MyAccount"
              # if ($jobStatus.Status -eq "Completed") { break }
              # if ($jobStatus.Status -eq "Failed") { exit 1 }
          }

          Write-Host "Snapshot creation time window completed"
          echo "success=true" >> $env:GITHUB_OUTPUT

      - name: Login to Azure (for job status verification)
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
        # Optional: Use this to actually verify the job status

      - name: Verify Snapshot Job Status (Optional)
        shell: pwsh
        run: |
          Write-Host "Verifying snapshot job status..."

          # Example: Query Azure Automation for job status
          # This requires the Az.Automation module and proper credentials

          try {
              # Install Az.Automation if not available
              if (-not (Get-Module -ListAvailable -Name Az.Automation)) {
                  Write-Host "Installing Az.Automation module..."
                  Install-Module -Name Az.Automation -Force -Scope CurrentUser -Repository PSGallery
              }

              Import-Module Az.Automation

              # Get recent jobs for the snapshot runbook
              $jobs = Get-AzAutomationJob `
                  -ResourceGroupName "${{ secrets.AUTOMATION_RESOURCE_GROUP }}" `
                  -AutomationAccountName "${{ secrets.AUTOMATION_ACCOUNT_NAME }}" `
                  -RunbookName "Invoke-PreChangeVmSnapshot" `
                  -ErrorAction SilentlyContinue |
                  Sort-Object CreationTime -Descending |
                  Select-Object -First 5

              if ($jobs) {
                  Write-Host "`nRecent snapshot jobs:"
                  $jobs | Format-Table JobId, Status, CreationTime, EndTime -AutoSize

                  $latestJob = $jobs[0]
                  Write-Host "`nLatest job status: $($latestJob.Status)"

                  if ($latestJob.Status -eq "Failed") {
                      Write-Error "Latest snapshot job failed! Deployment should not proceed."
                      exit 1
                  }

                  if ($latestJob.Status -ne "Completed") {
                      Write-Warning "Snapshot job is still running or in unexpected state: $($latestJob.Status)"
                  }
              } else {
                  Write-Host "Could not retrieve job status (this is OK for demo purposes)"
              }
          }
          catch {
              Write-Warning "Could not verify job status: $_"
              Write-Host "Proceeding with deployment (snapshot webhook was invoked successfully)"
          }

  # Job 2: Build the web application
  build:
    name: Build Web Application
    runs-on: windows-latest
    # Can run in parallel with snapshot creation

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore ./src/ContosoWebApp/ContosoWebApp.csproj
        # Fictitious project path

      - name: Build application
        run: |
          dotnet build ./src/ContosoWebApp/ContosoWebApp.csproj `
            --configuration Release `
            --no-restore

      - name: Publish application
        run: |
          dotnet publish ./src/ContosoWebApp/ContosoWebApp.csproj `
            --configuration Release `
            --output ./publish `
            --no-build

      - name: Upload build artifact
        uses: actions/upload-artifact@v3
        with:
          name: webapp-package
          path: ./publish
          retention-days: 1

  # Job 3: Deploy to IIS
  deploy:
    name: Deploy to IIS Server
    runs-on: windows-latest
    needs: [pre-deployment-snapshot, build]
    # Only run if snapshot succeeded (or was skipped)
    if: |
      always() &&
      (needs.pre-deployment-snapshot.result == 'success' ||
       needs.pre-deployment-snapshot.result == 'skipped') &&
      needs.build.result == 'success'
    environment:
      name: production
      url: https://contoso-webapp.example.com

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v3
        with:
          name: webapp-package
          path: ./package

      - name: Display Deployment Information
        shell: pwsh
        run: |
          Write-Host "========================================" -ForegroundColor Cyan
          Write-Host "Deployment Information" -ForegroundColor Cyan
          Write-Host "========================================" -ForegroundColor Cyan
          Write-Host "Environment:     ${{ inputs.environment || 'production' }}"
          Write-Host "Resource Group:  ${{ env.RESOURCE_GROUP }}"
          Write-Host "VM Name:         ${{ env.VM_NAME }}"
          Write-Host "Change ID:       gh-deploy-${{ env.DEPLOYMENT_ID }}"
          Write-Host "Snapshot Created: ${{ needs.pre-deployment-snapshot.outputs.snapshot_created || 'skipped' }}"
          Write-Host "Deploying:       ${{ env.AZURE_WEBAPP_NAME }}"
          Write-Host "========================================" -ForegroundColor Cyan

      - name: Deploy to IIS using WebDeploy
        shell: pwsh
        run: |
          Write-Host "Deploying application to IIS server..."

          # In a real scenario, you would use MSDeploy (Web Deploy) like this:
          # & "C:\Program Files\IIS\Microsoft Web Deploy V3\msdeploy.exe" `
          #     -verb:sync `
          #     -source:contentPath=".\package" `
          #     -dest:contentPath="${{ env.AZURE_WEBAPP_NAME }}",computerName="https://${{ secrets.IIS_SERVER }}:8172/msdeploy.axd",username="${{ secrets.DEPLOY_USERNAME }}",password="${{ secrets.DEPLOY_PASSWORD }}",authtype="Basic" `
          #     -enableRule:AppOffline `
          #     -allowUntrusted

          Write-Host "Simulating WebDeploy operation..."
          Start-Sleep -Seconds 3

          # Simulate deployment
          $files = Get-ChildItem -Path .\package -Recurse -File
          Write-Host "Files to deploy: $($files.Count)"

          Write-Host "✓ Application deployed successfully to IIS" -ForegroundColor Green

      - name: Verify Deployment
        shell: pwsh
        run: |
          Write-Host "Verifying deployment health..."

          # In production, you'd check the actual application endpoint
          # Example:
          # $response = Invoke-WebRequest -Uri "https://contoso-webapp.example.com/health" -UseBasicParsing
          # if ($response.StatusCode -ne 200) { exit 1 }

          Write-Host "✓ Deployment verification passed" -ForegroundColor Green

      - name: Update Deployment Record
        shell: pwsh
        run: |
          $deploymentInfo = @{
              Timestamp = (Get-Date).ToString("o")
              ChangeId = "gh-deploy-${{ env.DEPLOYMENT_ID }}"
              CommitSha = "${{ github.sha }}"
              DeployedBy = "${{ github.actor }}"
              Environment = "${{ inputs.environment || 'production' }}"
              SnapshotCreated = "${{ needs.pre-deployment-snapshot.outputs.snapshot_created || 'skipped' }}"
          } | ConvertTo-Json

          Write-Host "Deployment Record:"
          Write-Host $deploymentInfo

          # In production, you might send this to Azure Table Storage, Application Insights, etc.

  # Job 4: Post-deployment validation
  post-deployment:
    name: Post-Deployment Validation
    runs-on: windows-latest
    needs: [deploy]
    if: success()

    steps:
      - name: Run Smoke Tests
        shell: pwsh
        run: |
          Write-Host "Running post-deployment smoke tests..."

          $tests = @(
              @{ Name = "Homepage Accessible"; Status = "PASS" }
              @{ Name = "API Health Check"; Status = "PASS" }
              @{ Name = "Database Connection"; Status = "PASS" }
              @{ Name = "Static Assets Loading"; Status = "PASS" }
          )

          Write-Host "`nSmoke Test Results:" -ForegroundColor Cyan
          foreach ($test in $tests) {
              $color = if ($test.Status -eq "PASS") { "Green" } else { "Red" }
              Write-Host "  ✓ $($test.Name): $($test.Status)" -ForegroundColor $color
          }

          Write-Host "`n✓ All smoke tests passed" -ForegroundColor Green

      - name: Notification
        if: always()
        shell: pwsh
        run: |
          $status = if ("${{ job.status }}" -eq "success") { "✓ SUCCESSFUL" } else { "✗ FAILED" }
          $color = if ("${{ job.status }}" -eq "success") { "Green" } else { "Red" }

          Write-Host "`n========================================" -ForegroundColor $color
          Write-Host "Deployment Status: $status" -ForegroundColor $color
          Write-Host "========================================" -ForegroundColor $color
          Write-Host "Change ID: gh-deploy-${{ env.DEPLOYMENT_ID }}"
          Write-Host "Snapshot: Available for rollback (14 day retention)"
          Write-Host "Deployed by: ${{ github.actor }}"
          Write-Host "Commit: ${{ github.sha }}"

          # In production, send to Teams/Slack:
          # Invoke-RestMethod -Uri "${{ secrets.TEAMS_WEBHOOK }}" -Method POST -Body $notification
